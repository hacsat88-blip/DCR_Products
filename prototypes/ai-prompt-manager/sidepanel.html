<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI Prompt Manager</title>
        <link rel="stylesheet" href="sidepanel.css" />
        <!-- Material Icons for a modern look without heavy dependencies -->
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
            rel="stylesheet"
        />
    </head>

    <body>
        <div class="app-container">
            <header class="app-header">
                <h1>
                    <span class="material-icons-round">auto_awesome</span>
                    Prompts
                </h1>
                <div class="header-actions" style="display: flex; gap: 8px">
                    <button
                        id="import-btn"
                        class="icon-btn"
                        title="JSON/MDからインポート"
                    >
                        <span class="material-icons-round">file_upload</span>
                    </button>
                    <button
                        id="auto-sort-btn"
                        class="icon-btn"
                        title="未分類プロンプトをAIで自動整理"
                    >
                        <span class="material-icons-round">auto_fix_high</span>
                    </button>
                    <button
                        id="export-btn"
                        class="icon-btn"
                        title="全データをエクスポート"
                    >
                        <span class="material-icons-round">file_download</span>
                    </button>
                    <button
                        id="wrap-text-toggle-btn"
                        class="icon-btn"
                        title="テキストの折り返し切替"
                    >
                        <span class="material-icons-round">wrap_text</span>
                    </button>
                    <button
                        id="theme-toggle-btn"
                        class="icon-btn"
                        title="テーマ切替"
                    >
                        <span class="material-icons-round"
                            >brightness_auto</span
                        >
                    </button>
                    <button
                        id="display-mode-toggle-btn"
                        class="icon-btn"
                        title="表示モード切替"
                    >
                        <span class="material-icons-round">view_stream</span>
                    </button>
                    <button id="add-prompt-btn" class="btn btn-primary">
                        <span
                            class="material-icons-round"
                            style="font-size: 16px"
                            >add</span
                        >
                        追加
                    </button>
                </div>
            </header>

            <!-- 非表示のファイルインプット -->
            <input
                type="file"
                id="import-file-input"
                accept=".json,.md"
                style="display: none"
            />

            <div class="search-bar">
                <span class="material-icons-round search-icon">search</span>
                <input
                    type="text"
                    id="search-input"
                    placeholder="プロンプトを検索..."
                    autocomplete="off"
                />
                <button
                    id="ai-search-btn"
                    class="icon-btn ai-btn"
                    title="AIあいまい検索"
                    style="
                        position: absolute;
                        right: 12px;
                        top: 50%;
                        transform: translateY(-50%);
                        color: var(--primary-color);
                    "
                >
                    <span class="material-icons-round">auto_awesome</span>
                </button>
                <div id="search-suggestions" class="search-suggestions"></div>
            </div>

            <!-- カテゴリタブ -->
            <div class="tabs-wrapper">
                <button id="tab-scroll-left" class="tab-scroll-btn">
                    <span class="material-icons-round">chevron_left</span>
                </button>
                <div class="tabs-container" id="category-tabs">
                    <!-- JavaScriptで動的に生成 -->
                </div>
                <button
                    id="manage-categories-btn"
                    class="icon-btn tab-scroll-btn"
                    title="タグの管理"
                    style="
                        right: 24px;
                        border-left: 1px solid var(--border-color);
                        background: var(--bg-color);
                    "
                >
                    <span class="material-icons-round">local_offer</span>
                </button>
                <button id="tab-scroll-right" class="tab-scroll-btn">
                    <span class="material-icons-round">chevron_right</span>
                </button>
            </div>

            <!-- プロンプトのリスト表示エリア -->
            <main class="content-area" id="prompt-list">
                <!-- JavaScriptで動的に生成 -->
            </main>

            <!-- プロンプト追加/編集モーダル -->
            <div id="prompt-modal" class="modal hidden">
                <div class="modal-content">
                    <h2 id="modal-title">プロンプトを保存</h2>

                    <div class="form-group">
                        <label for="prompt-title">タイトル</label>
                        <input
                            type="text"
                            id="prompt-title"
                            placeholder="例: コードレビュー依頼"
                        />
                    </div>

                    <div class="form-group">
                        <label>カテゴリ (ジャンル) ※複数選択可</label>
                        <div class="category-inputs">
                            <div
                                id="prompt-category-checkboxes"
                                class="category-checkboxes"
                            >
                                <!-- JSで動的に追加 -->
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label
                            for="prompt-content"
                            style="
                                display: flex;
                                justify-content: space-between;
                                align-items: center;
                            "
                        >
                            <span>プロンプト本文</span>
                            <div style="display: flex; gap: 8px">
                                <button
                                    id="ai-generate-meta-btn"
                                    class="btn btn-secondary"
                                    style="
                                        font-size: 11px;
                                        padding: 4px 8px;
                                        display: flex;
                                        gap: 4px;
                                        align-items: center;
                                    "
                                >
                                    <span
                                        class="material-icons-round"
                                        style="font-size: 14px"
                                        >auto_fix_high</span
                                    >タイトル/分類を自動生成
                                </button>
                                <button
                                    id="ai-polish-btn"
                                    class="btn btn-secondary"
                                    style="
                                        font-size: 11px;
                                        padding: 4px 8px;
                                        display: flex;
                                        gap: 4px;
                                        align-items: center;
                                    "
                                >
                                    <span
                                        class="material-icons-round"
                                        style="font-size: 14px"
                                        >edit_note</span
                                    >プロンプトを整形
                                </button>
                            </div>
                        </label>
                        <textarea
                            id="prompt-content"
                            rows="6"
                            placeholder="プロンプトを入力してください..."
                        ></textarea>
                    </div>

                    <div class="modal-actions">
                        <button id="modal-cancel-btn" class="btn btn-secondary">
                            キャンセル
                        </button>
                        <button id="modal-save-btn" class="btn btn-primary">
                            保存
                        </button>
                    </div>
                </div>
            </div>

            <!-- カテゴリ/タグ管理モーダル -->
            <div id="category-modal" class="modal hidden">
                <div class="modal-content">
                    <h2>タグの管理</h2>

                    <div class="form-group" style="margin-bottom: 16px">
                        <label for="new-category-name">新しいタグを追加</label>
                        <div style="display: flex; gap: 8px">
                            <input
                                type="text"
                                id="new-category-name"
                                placeholder="例: SNS用"
                            />
                            <button
                                id="add-category-btn"
                                class="btn btn-primary"
                            >
                                追加
                            </button>
                        </div>
                    </div>

                    <div class="category-list-container">
                        <ul
                            id="category-manage-list"
                            class="category-manage-list"
                        >
                            <!-- JSで動的に追加 -->
                        </ul>
                    </div>

                    <div class="modal-actions" style="margin-top: 24px">
                        <button
                            id="category-modal-close-btn"
                            class="btn btn-primary"
                        >
                            閉じる
                        </button>
                    </div>
                </div>
            </div>
            <!-- 変数入力モーダル -->
            <div id="variable-modal" class="modal hidden">
                <div class="modal-content">
                    <h3 id="variable-modal-title">変数の入力</h3>
                    <div id="variable-inputs-container"></div>
                    <div class="modal-actions">
                        <button
                            id="variable-modal-cancel-btn"
                            class="btn btn-secondary"
                        >
                            キャンセル
                        </button>
                        <button
                            id="variable-modal-insert-btn"
                            class="btn btn-primary"
                        >
                            挿入 / コピー
                        </button>
                    </div>
                </div>
            </div>

            <div class="toast-container">
                <div id="toast" class="toast hidden">コピーしました</div>
            </div>
        </div>

        <script src="ai-service.js"></script>
        <script src="sidepanel.js"></script>
    </body>
</html>
